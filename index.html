<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic-Tac-Toe</title>
    <link rel="stylesheet" href="style.css">
    <script src="./script.js" defer></script>
</head>
<body>
    <main>
        <div class="player-turn-container">
            <span class="player-span player1-span player-turn">Player 1 - <b>X</b></span>
            <button class="reset-btn">
                <img src="./reset.svg" alt="">
            </button>
            <span class="player-span player2-span">Player 2 - <b>O</b></span>
        </div>

        <section class="grid-container">
            <div class="box box1" data-row="0" data-col="0" data-marker=""></div>
            <div class="box box2" data-row="0" data-col="1" data-marker=""></div>
            <div class="box box3" data-row="0" data-col="2" data-marker=""></div>
            <div class="box box4" data-row="1" data-col="0" data-marker=""></div>
            <div class="box box5" data-row="1" data-col="1" data-marker=""></div>
            <div class="box box6" data-row="1" data-col="2" data-marker=""></div>
            <div class="box box7" data-row="2" data-col="0" data-marker=""></div>
            <div class="box box8" data-row="2" data-col="1" data-marker=""></div>
            <div class="box box9" data-row="2" data-col="2" data-marker=""></div>
        </section>

    </main>   
    
</body>
</html>
