<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic-Tac-Toe</title>
    <link rel="stylesheet" href="style.css">
    <script src="./script.js" defer></script>
</head>
<body>
    <main>
        <div class="player-turn-container">
            <span class="player-span player-turn">Player 1 - <b>X</b></span>
            <button>
                <img src="./reset.svg" alt="">
            </button>
            <span class="player-span">Player 2 - <b>O</b></span>
        </div>
        <section class="grid-container">
            <div class="box box1">
                <img src="./shape-oval-svgrepo-com.svg">
            </div>
            <div class="box box2">
                <img src="./cross-svgrepo-com.svg" alt="">
            </div>
            <div class="box box3">3</div>
            <div class="box box4">4</div>
            <div class="box box5">
                <img src="./shape-oval-svgrepo-com.svg">
            </div>
            <div class="box box6">6</div>
            <div class="box box7">7</div>
            <div class="box box8">8</div>
            <div class="box box9">9</div>
        </section>
    </main>   
    
</body>
</html>
